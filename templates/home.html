{% extends "base.html" %}

{% block title %}홈 - My Django App{% endblock %}

{% block content %}
    <div class="home-container" style="text-align: center; margin-top: 50px;">
        {% if user.is_authenticated %}
            <h1>안녕하세요, {{ user.email }}님!</h1>
            <p>서비스를 이용하실 준비가 되었습니다.</p>

            <div style="margin-top: 30px; display: flex; justify-content: center; gap: 10px;">
                <a href="#"
                   style="padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 5px;">마이페이지</a>
                <a href="#"
                   style="padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px;">내
                    활동 내역</a>
            </div>
        {% else %}
            <h1>반갑습니다!</h1>
            <p>더 많은 기능을 이용하시려면 로그인이 필요합니다.</p>

            <div style="margin-top: 30px;">
                <a href="{% url 'login' %}"
                   style="padding: 10px 20px; border: 1px solid #007bff; color: #007bff; text-decoration: none; border-radius: 5px;">로그인하러
                    가기</a>
            </div>
        {% endif %}
    </div>
{% endblock %}
