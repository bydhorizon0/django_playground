{% extends "base.html" %}

{% block content %}
    <h2>{% if form.instance.pk %}게시글 수정{% else %}새 게시글 작성{% endif %}</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">저장</button>
        <a href="javascript:history.back()" class="btn btn-secondary">취소</a>
    </form>
{% endblock %}
